services:
  - type: web
    name: mamyr-server
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m app.seeds.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mamyr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
